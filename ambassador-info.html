<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Ambassador - Monturalearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation */
        .top-nav {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-img {
            height: 50px;
            width: auto;
        }

        .nav-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #9f7261;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 2rem;
        }

        .content-wrapper {
            max-width: 860px;
            width: 100%;
            text-align: center;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1rem;
        }

        .welcome-subtitle {
            font-size: 1.125rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* ── Promo Code Box ── */
        .promo-box {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 1.75rem 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .promo-box .info-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1rem;
        }

        .referral-code {
            background: white;
            border: 2px solid #1d7fe2;
            border-radius: 12px;
            padding: 1.25rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1d7fe2;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .copy-btn {
            background: #1d7fe2;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #1565c0;
        }

        /* ── Keep-safe note ── */
        .keep-safe-note {
            background: #fef9c3;
            border: 2px solid #fbbf24;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            color: #92400e;
            font-size: 0.9375rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* Continue Button */
        #continueBtn {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 18px 32px;
            background: #1d7fe2;
            color: #fff;
            border: none;
            border-radius: 13px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: block;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        #continueBtn:hover {
            background: #1565c0;
        }

        /* Mobile Responsive */
        @media (max-width: 700px) {
            .top-nav { padding: 1rem 1.5rem; }
            .logo-img { height: 40px; }
            .nav-title { font-size: 1rem; }
            .welcome-title { font-size: 2rem; }
            .welcome-subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <img src="https://i.postimg.cc/vH9GHtHV/erasebg-transformed.png" alt="GMM Logo" class="logo-img">
        <span class="nav-title">Ambassador Programme</span>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="content-wrapper">
            <h1 class="welcome-title">Welcome, Ambassador! 🎉</h1>
            <p class="welcome-subtitle">You're now part of the Montura ambassador programme. Here's your unique promo code.</p>

            <!-- ── Single promo code box ── -->
            <div class="promo-box">
                <h2 class="info-title">Your Promo Code</h2>
                <div class="referral-code" id="referralCode">STUDIES14</div>
                <button class="copy-btn" onclick="copyReferralCode()">Copy Code</button>
            </div>

            <!-- Keep-safe note -->
            <div class="keep-safe-note">
                📝 Keep this code somewhere safe — like a notepad or your phone's notes app — so you don't lose it.
            </div>

            <!-- Continue Button -->
            <button id="continueBtn" onclick="startOnboarding()">
                Continue to Onboarding →
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const referralCode = sessionStorage.getItem('referral_code');
            if (referralCode) {
                document.getElementById('referralCode').textContent = referralCode;
            }
        });

        function copyReferralCode() {
            const code = document.getElementById('referralCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied! ✓';
                btn.style.background = '#10b981';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '#1d7fe2';
                }, 2000);
            });
        }

        function startOnboarding() {
            // Bridge the session into the localStorage object that
            // ambassador-dashboard.html expects. Without this, the
            // dashboard can't recognise the ambassador and the
            // onboarding modal never shows.
            const ambassadorId = sessionStorage.getItem('ambassador_id');
            const referralCode = sessionStorage.getItem('referral_code');
            const email = sessionStorage.getItem('ambassador_email');

            localStorage.setItem('ambassador', JSON.stringify({
                id: ambassadorId,
                email: email,
                referralCode: referralCode
            }));

            window.location.href = '/ambassador-dashboard.html';
        }
    </script>
</body>
</html>
