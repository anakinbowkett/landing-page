    // Topic card click handlers
    document.querySelectorAll('.topic-card').forEach(card => {
        card.addEventListener('click', function() {
            const topicNum = this.dataset.topic;
            
            // Check if this card already has expanded content
            let expandedContent = this.nextElementSibling;
            
            // Close all other expanded contents
            document.querySelectorAll('.topic-expanded-content').forEach(content => {
                if (content !== expandedContent) {
                    content.classList.remove('open');
                    content.previousElementSibling.classList.remove('expanded');
                    setTimeout(() => {
                        if (!content.classList.contains('open')) {
                            content.remove();
                        }
                    }, 400);
                }
            });

            // Toggle current expansion
            if (expandedContent && expandedContent.classList.contains('topic-expanded-content')) {
                // Already exists, toggle it
                expandedContent.classList.toggle('open');
                this.classList.toggle('expanded');
                
                if (!expandedContent.classList.contains('open')) {
                    setTimeout(() => {
                        if (!expandedContent.classList.contains('open')) {
                            expandedContent.remove();
                        }
                    }, 400);
                }
            } else {
                // Create new expanded content
                createExpandedContent(topicNum, this);
            }
        });
    });

    function createExpandedContent(topicNum, cardElement) {
        const data = topicData[topicNum];
        let accordionHTML = '';

        // Generate grid layout with 8 items per accordion
        const itemsPerAccordion = 8;
        const numAccordions = Math.ceil(data.sections.length / itemsPerAccordion);

        for (let i = 0; i < numAccordions; i++) {
            const startIdx = i * itemsPerAccordion;
            const endIdx = Math.min(startIdx + itemsPerAccordion, data.sections.length);
            const sectionsInAccordion = data.sections.slice(startIdx, endIdx);
            
            const rangeStart = sectionsInAccordion[0].number;
            const rangeEnd = sectionsInAccordion[sectionsInAccordion.length - 1].number;
            const accordionTitle = `Topics ${rangeStart}–${rangeEnd}`;

            let gridHTML = '<div class="topic-grid-container">';
            
            sectionsInAccordion.forEach(section => {
                gridHTML += `
                    <div class="topic-item" data-topic-id="${section.number}">
                        <div class="topic-item-header">
                            <span class="topic-item-number">${section.number}</span>
                            <span class="topic-item-title">${section.title}</span>
                        </div>
                        <div class="topic-item-progress">
                            <div class="topic-item-progress-fill" style="width: ${section.progress}%"></div>
                        </div>
                    </div>
                `;
            });
            
            gridHTML += '</div>';

            accordionHTML += `
                <div class="accordion-item">
                    <div class="accordion-header" data-index="${i}">
                        <h3>${accordionTitle}</h3>
                        <svg class="accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </div>
                    <div class="accordion-body">
                        <div class="accordion-content">
                            ${gridHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        const expandedDiv = document.createElement('div');
        expandedDiv.className = 'topic-expanded-content';
        expandedDiv.innerHTML = accordionHTML;

        // Insert after the card
        cardElement.parentNode.insertBefore(expandedDiv, cardElement.nextSibling);
        cardElement.classList.add('expanded');

        // Trigger animation
        setTimeout(() => {
            expandedDiv.classList.add('open');
            
            // Open first accordion by default
            setTimeout(() => {
                const firstAccordion = expandedDiv.querySelector('.accordion-header');
                const firstBody = expandedDiv.querySelector('.accordion-body');
                const firstIcon = expandedDiv.querySelector('.accordion-icon');
                if (firstAccordion && firstBody && firstIcon) {
                    firstBody.classList.add('open');
                    firstIcon.classList.add('rotated');
                }
            }, 200);
        }, 50);

        // Accordion functionality
        expandedDiv.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', function() {
                const body = this.nextElementSibling;
                const icon = this.querySelector('.accordion-icon');
                body.classList.toggle('open');
                icon.classList.toggle('rotated');
            });
        });

        // Topic item click handlers
        expandedDiv.querySelectorAll('.topic-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                const topicId = this.dataset.topicId;
                console.log('Navigating to topic:', topicId, this.querySelector('.topic-item-title').textContent);
                // Add your navigation logic here
            });
        });
    }
