function chunkIntoPillars(sections, chunkSize) {
    chunkSize = chunkSize || 8;
    var pillars = [];
    for (var i = 0; i < sections.length; i += chunkSize) {
        pillars.push(sections.slice(i, i + chunkSize));
    }
    return pillars;
}

function aggBlocksHTML(count) {
    var html = '';
    for (var i = 0; i < count; i++) html += '<div class="lec-agg-block"></div>';
    return html;
}

    row.className = 'lec-sub-row';
    row.innerHTML = '<div class="lec-sub-left"><span class="lec-sub-num">' + section.number + '</span><span class="lec-sub-name">' + section.title + '</span></div><div class="lec-sub-right"><div class="lec-blocks">' + blocks + '</div><span class="lec-sub-arrow">&#8594;</span></div>';
    row.addEventListener('click', (function(url){ return function(){ window.location.href = url; }; })(section.url));
    return row;
}

function buildPillarBox(pillarSections) {
    var first = pillarSections[0].number;
    var last  = pillarSections[pillarSections.length - 1].number;
    var label = pillarSections.length === 1 ? first : first + '\u2013' + last;
    var names = pillarSections.slice(0, 2).map(function(s){ return s.title.split(' ').slice(0,3).join(' '); }).join(', ');
    if (pillarSections.length > 2) names += '\u2026';
    var box = document.createElement('div');
    box.className = 'lec-pillar-box';
    var hdr = document.createElement('div');
    hdr.className = 'lec-pillar-header';
    hdr.innerHTML = '<div class="lec-pillar-header-left"><span class="lec-pillar-tag">Topics ' + label + '</span><span class="lec-pillar-name">' + names + '</span></div><div class="lec-pillar-header-right"><div class="lec-aggregate-blocks">' + aggBlocksHTML(pillarSections.length) + '</div><span class="lec-pillar-chevron">&#8250;</span></div>';
    var body = document.createElement('div');
    body.className = 'lec-pillar-body';
    pillarSections.forEach(function(s){ body.appendChild(buildRow(s)); });
    hdr.addEventListener('click', function(e){ e.stopPropagation(); box.classList.toggle('open'); });
    box.appendChild(hdr);
    box.appendChild(body);
    return box;
}

var list = document.getElementById('papersList');
papersData.forEach(function(paper) {
    var item = document.createElement('div');
    item.className = 'paper-item';
    var header = document.createElement('button');
    header.className = 'paper-header';
    header.innerHTML = '<div class="paper-header-left"><span class="paper-tag">' + paper.tag + '</span><span class="paper-title">' + paper.title + '</span></div><span class="paper-chevron">&#8250;</span>';
    var body = document.createElement('div');
    body.className = 'paper-body';
    var panel = document.createElement('div');
    panel.className = 'lec-panel';
    var pillarsDiv = document.createElement('div');
    pillarsDiv.className = 'lec-pillars';
    var pillars = chunkIntoPillars(paper.sections, 8);
    pillars.forEach(function(pillarSections, pi) {
        var pillarBox = buildPillarBox(pillarSections);
        if (pi === 0) {
            item.addEventListener('click', function openFirst() {
                if (item.classList.contains('open')) pillarBox.classList.add('open');
                item.removeEventListener('click', openFirst);
            });
        }
        pillarsDiv.appendChild(pillarBox);
    });
    panel.appendChild(pillarsDiv);
    body.appendChild(panel);
    header.addEventListener('click', function(){ item.classList.toggle('open'); });
    item.appendChild(header);
    item.appendChild(body);
    list.appendChild(item);
});
</script>
</body>
</html>
