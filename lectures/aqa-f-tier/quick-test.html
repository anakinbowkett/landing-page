    .section-hdr-left { display: flex; align-items: center; gap: 10px; }

    .section-title { font-size: 13px; font-weight: 600; color: #111827; }
    .section-hdr-right { display: flex; align-items: center; gap: 8px; }
    .section-count { font-size: 11px; color: #9ca3af; }

    .topic-num-label { font-size: 11px; color: #d1d5db; min-width: 22px; flex-shrink: 0; }
    .topic-title { font-size: 12px; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topic-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .exp-block { width: 9px; height: 9px; border-radius: 2px; background: #efefef; }
    .exp-block.correct { background: #54d3ab; }
    .exp-block.wrong { background: #e16280; }

    .add-btn.added { background: #111827; border-color: #111827; color: #fff; font-size: 10px; }

let topicPerformance = {};

async function init() {
    try {
        const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        const data = await res.json();
        if (data && data.id) {
            currentUser = data;
            const pRes = await fetch(SUPABASE_URL + '/rest/v1/user_profiles?id=eq.' + data.id + '&select=first_name,current_grade,current_grade_tier', {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
            });
            const profiles = await pRes.json();
            if (profiles && profiles[0]) {
                currentProfile = profiles[0];
                const grade = currentProfile.current_grade || 3;
                const tier = currentProfile.current_grade_tier || 'Foundation';
                document.getElementById('gradeLabel').textContent = 'Grade ' + grade + ' ' + tier;
            }
            await loadPerformanceData();
        }
    } catch(e) {
        document.getElementById('gradeLabel').textContent = 'Foundation';
    }
    buildTopicSections();
    loadSuggestedTopics();
}

async function loadPerformanceData() {
    if (!currentUser) return;
    try {
        const res = await fetch(
            SUPABASE_URL + '/rest/v1/quiz_question_results?user_id=eq.' + currentUser.id + '&select=topic_name,result',
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        const rows = await res.json();
        if (!rows || !rows.length) return;
        const grouped = {};
        rows.forEach(r => {
            if (!grouped[r.topic_name]) grouped[r.topic_name] = { correct: 0, total: 0 };
            grouped[r.topic_name].total++;
            if (r.result === 'correct') grouped[r.topic_name].correct++;
        });
        Object.keys(grouped).forEach(k => {
            grouped[k].pct = Math.round(grouped[k].correct / grouped[k].total * 100);
        });
        topicPerformance = grouped;
    } catch(e) {}
}

function buildTopicSections() {
    const container = document.getElementById('topicSections');
    container.innerHTML = '';
    topicsData.forEach(section => {
        const sec = document.createElement('div');
        sec.className = 'topic-section';
        const hdr = document.createElement('div');
        hdr.className = 'section-hdr';
        hdr.innerHTML = `
            <div class="section-hdr-left">
                <span class="section-tag">${section.tag}</span>
                <span class="section-title">${section.title}</span>
            </div>
            <div class="section-hdr-right">
                <span class="section-count">${section.topics.length} topics</span>
                <span class="section-chev">›</span>
            </div>`;
        hdr.addEventListener('click', () => sec.classList.toggle('open'));
        const rows = document.createElement('div');
        rows.className = 'topic-rows';
        section.topics.forEach(topic => {
            const perf = topicPerformance[topic.t];
            const blocks = Array.from({length: 6}, (_, i) => {
                if (!perf) return '<div class="exp-block"></div>';
                const filled = Math.round(perf.pct / 100 * 6);
                const isCorrect = i < filled;
                const isWrong = !isCorrect && perf.total > 0 && i < Math.min(6, Math.round((1 - perf.pct/100) * 3 + filled));
                return `<div class="exp-block${isCorrect ? ' correct' : (isWrong ? ' wrong' : '')}"></div>`;
            }).join('');
            const isAdded = selectedTopics.some(s => s.url === topic.url);
            const row = document.createElement('div');
            row.className = 'topic-row';
            row.innerHTML = `
                <div class="topic-row-left">
                    <span class="topic-num-label">${topic.n}</span>
                    <span class="topic-title">${topic.t}</span>
                </div>
                <div class="topic-row-right">
                    <div class="exp-blocks">${blocks}</div>
                    <div class="add-btn${isAdded ? ' added' : ''}" data-url="${topic.url}" data-title="${topic.t}">${isAdded ? '✓' : '+'}</div>
                </div>`;
            row.querySelector('.add-btn').addEventListener('click', e => {
                e.stopPropagation();
                toggleTopic(topic, e.target);
            });
            rows.appendChild(row);
        });
        sec.appendChild(hdr);
        sec.appendChild(rows);
        container.appendChild(sec);
    });
}

function toggleTopic(topic, btn) {
    const idx = selectedTopics.findIndex(s => s.url === topic.url);
    if (idx > -1) {
        selectedTopics.splice(idx, 1);
        btn.classList.remove('added');
        btn.textContent = '+';
    } else {
        selectedTopics.push(topic);
        btn.classList.add('added');
        btn.textContent = '✓';
    }
    updatePool();
}

function updatePool() {
    const poolList = document.getElementById('poolList');
    const poolCount = document.getElementById('poolCount');
    const countSection = document.getElementById('countSection');
    const startBtn = document.getElementById('startBtn');
    const startBadge = document.getElementById('startBadge');
    const slider = document.getElementById('qSlider');

    poolCount.textContent = selectedTopics.length + (selectedTopics.length === 1 ? ' topic' : ' topics');

    if (selectedTopics.length === 0) {
        poolList.innerHTML = '<div class="pool-empty"><div class="pool-empty-icon">+</div><div class="pool-empty-text">Add topics from the left<br>to build your quiz</div></div>';
        countSection.style.display = 'none';
        startBtn.className = 'start-btn disabled';
        startBadge.textContent = '0 Qs';
        return;
    }

    const qCount = parseInt(slider.value) || 20;
    const perTopic = Math.max(1, Math.round(qCount / selectedTopics.length));

    poolList.innerHTML = '';
    const listDiv = document.createElement('div');
    listDiv.className = 'pool-list';
    selectedTopics.forEach(topic => {
        const perf = topicPerformance[topic.t];
        const isWeak = perf && perf.pct < 60;
        const row = document.createElement('div');
        row.className = 'pool-topic-row';
        row.innerHTML = `
            <div>
                <div class="pool-topic-name">${topic.t}</div>
                <div class="pool-topic-meta${isWeak ? ' weak' : ''}">${isWeak ? 'needs work · ' : ''}${perTopic} question${perTopic !== 1 ? 's' : ''}</div>
            </div>
            <button class="remove-btn" data-url="${topic.url}">×</button>`;
        row.querySelector('.remove-btn').addEventListener('click', () => {
            const idx = selectedTopics.findIndex(s => s.url === topic.url);
            if (idx > -1) selectedTopics.splice(idx, 1);
            const addBtn = document.querySelector(`.add-btn[data-url="${topic.url}"]`);
            if (addBtn) { addBtn.classList.remove('added'); addBtn.textContent = '+'; }
            updatePool();
        });
        listDiv.appendChild(row);
    });
    poolList.appendChild(listDiv);
    countSection.style.display = 'block';
    startBtn.className = 'start-btn';
    startBadge.textContent = qCount + ' Qs';
}

document.getElementById('qSlider').addEventListener('input', function() {
    document.getElementById('countDisplay').textContent = this.value;
    updatePool();
});

async function loadSuggestedTopics() {
    const listEl = document.getElementById('suggestedList');
    const subEl = document.getElementById('suggestedSub');
    const startBtn = document.getElementById('suggestedStartBtn');

    if (!currentUser) {
        subEl.textContent = 'Sign in to see suggested topics';
        listEl.innerHTML = '<div class="suggested-empty">No data yet</div>';
        return;
    }

    try {
        const res = await fetch(
            SUPABASE_URL + '/rest/v1/quiz_question_results?user_id=eq.' + currentUser.id +
            '&needs_retest=eq.true&select=topic_name,result&limit=50',
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        const rows = await res.json();

        if (!rows || !rows.length) {
            subEl.textContent = 'Complete some quizzes to get suggestions';
            listEl.innerHTML = '<div class="suggested-empty">No weak topics yet — keep going!</div>';
            return;
        }

        const grouped = {};
        rows.forEach(r => {
            if (!grouped[r.topic_name]) grouped[r.topic_name] = { correct: 0, total: 0 };
            grouped[r.topic_name].total++;
            if (r.result === 'correct') grouped[r.topic_name].correct++;
        });

        weakTopics = Object.entries(grouped)
            .map(([name, d]) => ({ name, pct: Math.round(d.correct / d.total * 100), total: d.total }))
            .sort((a, b) => a.pct - b.pct)
            .slice(0, 5);

        subEl.textContent = weakTopics.length + ' topic' + (weakTopics.length !== 1 ? 's' : '') + ' where you need more practice';
        listEl.innerHTML = '';

        weakTopics.forEach(wt => {
            const row = document.createElement('div');
            row.className = 'weak-topic-row';
            row.innerHTML = `
                <span class="weak-name">${wt.name}</span>
                <span class="weak-pct${wt.pct === 0 ? ' zero' : ''}">${wt.pct}% correct</span>`;
            listEl.appendChild(row);
        });

        const totalQ = Math.min(40, weakTopics.length * 6);
        startBtn.style.display = 'flex';
        startBtn.querySelector('span') && (startBtn.querySelector('span').textContent = totalQ + ' Qs');
        document.getElementById('suggestedBadge').textContent = totalQ + ' Qs';

    } catch(e) {
        subEl.textContent = 'Could not load suggestions';
        listEl.innerHTML = '<div class="suggested-empty">Try again later</div>';
    }
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('tabBuild').className = 'mode-tab' + (mode === 'build' ? ' active' : '');
    document.getElementById('tabSuggest').className = 'mode-tab' + (mode === 'suggest' ? ' active' : '');
}

function startQuiz() {
    if (selectedTopics.length === 0) return;
    const qCount = parseInt(document.getElementById('qSlider').value) || 20;
    const urls = selectedTopics.map(t => t.url);
    sessionStorage.setItem('quizTopics', JSON.stringify(urls));
    sessionStorage.setItem('quizCount', qCount);
    sessionStorage.setItem('quizMode', 'custom');
    if (selectedTopics.length === 1) {
        window.location.href = selectedTopics[0].url + '?count=' + qCount;
    } else {
        window.location.href = 'quick-tests/multi-topic-quiz.html';
    }
}

function startSuggestedQuiz() {
    if (!weakTopics.length) return;
    const allTopics = topicsData.flatMap(s => s.topics);
    const urls = weakTopics.map(wt => {
        const match = allTopics.find(t => t.t === wt.name);
        return match ? match.url : null;
    }).filter(Boolean);
    if (!urls.length) return;
    sessionStorage.setItem('quizTopics', JSON.stringify(urls));
    sessionStorage.setItem('quizCount', Math.min(40, urls.length * 6));
    sessionStorage.setItem('quizMode', 'suggested');
    if (urls.length === 1) {
        window.location.href = urls[0];
    } else {
        window.location.href = 'quick-tests/multi-topic-quiz.html';
    }
}
