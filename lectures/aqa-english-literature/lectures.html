<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA English Literature - Lectures</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
    <div class="logo">Montura Learn</div>
    <a href="../../dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
    <a href="lectures.html"        class="nav-item active"><span class="nav-icon">∞</span><span>Lectures</span></a>
    <a href="flashtiles.html"      class="nav-item"><span class="nav-icon">⚡</span><span>Flashtiles</span></a>
    <a href="quick-test.html"      class="nav-item"><span class="nav-icon">🕐</span><span>Recall</span></a>
    <a href="past-papers.html"     class="nav-item"><span class="nav-icon">📄</span><span>Past Papers</span></a>
    <div class="nav-spacer"></div>
    <button class="live-study-btn">Allow Live Study</button>
</aside>

<main class="main-content">
    <div class="content-wrapper">
        <div class="subject-header">
            <div class="subject-line-left"></div>
            <h1 class="subject-name">English Literature</h1>
            <div class="subject-line-right"></div>
        </div>
    </div>
    <section class="topics-section">
        <div class="papers-list" id="papersList"></div>
    </section>
</main>

<script src="lectures-data.js"></script>
<script>

/* ════════════════════════════════════════════
   BUILD UI
════════════════════════════════════════════ */
const list = document.getElementById('papersList');

papersData.forEach((paper) => {
    const item = document.createElement('div');
    item.className = 'paper-item';

    const header = document.createElement('button');
    header.className = 'paper-header';
    header.innerHTML = `
        <div class="paper-header-left">
            <span class="paper-tag">${paper.tag}</span>
            <span class="paper-title">${paper.title}</span>
        </div>
        <span class="paper-chevron">›</span>`;

    const body = document.createElement('div');
    body.className = 'paper-body';

    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'subject-cards';

    if (paper.type === 'multi') {
        /* Multi-text: Shakespeare, novels, prose/drama */
        const panel = buildMultiTextPanel(paper.texts);
        cardsWrap.appendChild(panel);
    } else {
        /* Single: poetry clusters and unseen */
        const panel = buildSinglePanel(paper.pillars, paper.title);
        cardsWrap.appendChild(panel);
    }

    body.appendChild(cardsWrap);
    header.addEventListener('click', () => item.classList.toggle('open'));
    item.appendChild(header);
    item.appendChild(body);
    list.appendChild(item);
});

/* ════════════════════════════════════════════
   MULTI-TEXT PANEL (text selector + pillars)
════════════════════════════════════════════ */
function buildMultiTextPanel(texts) {
    const panel = document.createElement('div');
    panel.className = 'lec-panel';

    let activeIdx = 0;
    const states = {};

    function ensureStates(tIdx) {
        texts[tIdx].pillars.forEach((p, pi) => {
            p.lectures.forEach((_, li) => {
                const k = `${tIdx}-${pi}-${li}`;
                if (!states[k]) states[k] = Array(6).fill(null);
            });
        });
    }

    function aggBlocks(tIdx, pi, pillar) {
        return pillar.lectures.map((_, li) => {
            const s = states[`${tIdx}-${pi}-${li}`] || [];
            const c = s.filter(x => x==='correct').length;
            const w = s.filter(x => x==='wrong').length;
            const cls = (c+w)===6 ? (w>0?'wrong':'correct') : ((c+w)>0?'correct':'');
            return `<div class="lec-agg-block ${cls}"></div>`;
        }).join('');
    }

    function render() {
        ensureStates(activeIdx);
        panel.innerHTML = '';

        /* Text selector — same catalogue grid used on the Flashtiles side */
        const grid = document.createElement('div');
        grid.className = 'catalogue-grid';
        grid.style.marginTop = '0';
        texts.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = 'catalogue-card' + (i === activeIdx ? ' active' : '');
            card.innerHTML = `
                <div class="catalogue-card-name">${t.name}</div>
                <div class="catalogue-card-meta">${t.pillars.length} pillars</div>`;
            card.addEventListener('click', e => { e.stopPropagation(); activeIdx = i; render(); });
            grid.appendChild(card);
        });

        /* Pillars */
        const pillarsDiv = document.createElement('div');
        pillarsDiv.className = 'lec-pillars';
        const text = texts[activeIdx];

        text.pillars.forEach((pillar, pi) => {
            const box = document.createElement('div');
            box.className = 'lec-pillar-box';
            const hdr = document.createElement('div');
            hdr.className = 'lec-pillar-header';
            hdr.innerHTML = `
                <div class="lec-pillar-header-left">
                    <span class="lec-pillar-tag">${pillar.tag}</span>
                    <span class="lec-pillar-name">${pillar.title}</span>
                </div>
                <div class="lec-pillar-header-right">
                    <div class="lec-aggregate-blocks">${aggBlocks(activeIdx,pi,pillar)}</div>
                    <span class="lec-pillar-chevron">›</span>
                </div>`;
            hdr.addEventListener('click', e => { e.stopPropagation(); box.classList.toggle('open'); });

            const bdy = document.createElement('div');
            bdy.className = 'lec-pillar-body';

            pillar.lectures.forEach((slug, li) => {
                const title = slugToTitle(slug);
                const row = document.createElement('div');
                row.className = 'lec-sub-row';
                row.innerHTML = `
                    <div class="lec-sub-left">
                        <span class="lec-sub-num">${li+1}</span>
                        <span class="lec-sub-name">${title}</span>
                    </div>
                    <div class="lec-sub-right">
                        <div class="lec-blocks">${Array(6).fill('<div class="lec-block"></div>').join('')}</div>
                        <span class="lec-sub-arrow">→</span>
                    </div>`;
                row.addEventListener('click', e => {
                    e.stopPropagation();
                    window.location.href = `lectures/${slug}.html`;
                });
                bdy.appendChild(row);
            });

            box.appendChild(hdr); box.appendChild(bdy);
            pillarsDiv.appendChild(box);
        });

        panel.appendChild(grid);
        panel.appendChild(pillarsDiv);
    }

    render();
    return panel;
}

/* ════════════════════════════════════════════
   SINGLE PANEL (poetry clusters & unseen)
════════════════════════════════════════════ */
function buildSinglePanel(pillars) {
    const panel = document.createElement('div');
    panel.className = 'lec-panel';
    panel.style.padding = '0';

    const pillarsDiv = document.createElement('div');
    pillarsDiv.className = 'lec-pillars';
    pillarsDiv.style.padding = '16px';

    pillars.forEach((pillar, pi) => {
        const box = document.createElement('div');
        box.className = 'lec-pillar-box';

        const hdr = document.createElement('div');
        hdr.className = 'lec-pillar-header';
        hdr.innerHTML = `
            <div class="lec-pillar-header-left">
                <span class="lec-pillar-tag">${pillar.tag}</span>
                <span class="lec-pillar-name">${pillar.title}</span>
            </div>
            <div class="lec-pillar-header-right">
                <div class="lec-aggregate-blocks">${pillar.lectures.map(()=>'<div class="lec-agg-block"></div>').join('')}</div>
                <span class="lec-pillar-chevron">›</span>
            </div>`;
        hdr.addEventListener('click', e => { e.stopPropagation(); box.classList.toggle('open'); });

        const bdy = document.createElement('div');
        bdy.className = 'lec-pillar-body';

        pillar.lectures.forEach((lec, li) => {
            const slug  = typeof lec === 'string' ? lec : lec.slug;
            const title = typeof lec === 'string'
                ? slugToTitle(slug)
                : lec.title;

            const row = document.createElement('div');
            row.className = 'lec-sub-row';
            row.innerHTML = `
                <div class="lec-sub-left">
                    <span class="lec-sub-num">${li+1}</span>
                    <span class="lec-sub-name">${title}</span>
                </div>
                <div class="lec-sub-right">
                    <div class="lec-blocks">${Array(6).fill('<div class="lec-block"></div>').join('')}</div>
                    <span class="lec-sub-arrow">→</span>
                </div>`;
            row.addEventListener('click', e => {
                e.stopPropagation();
                window.location.href = `lectures/${slug}.html`;
            });
            bdy.appendChild(row);
        });

        box.appendChild(hdr); box.appendChild(bdy);
        pillarsDiv.appendChild(box);
    });

    panel.appendChild(pillarsDiv);
    return panel;
}
</script>
</body>
</html>
