<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA English Literature - Recall</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
    <style>
        .daily-panel {
            max-width: 640px;
            margin: 32px 3rem 0;
            background: white;
            border: 1px solid #d4d4d4;
            border-radius: 16px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .daily-stats {
            display: flex;
            gap: 16px;
        }
        .daily-stat {
            flex: 1;
            background: #f9fafb;
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
        }
        .daily-stat-num {
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.02em;
        }
        .daily-stat-label {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 500;
            margin-top: 4px;
        }
        .start-btn {
            background: #1d7fe2;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .start-btn:hover { background: #1668c2; }
        .streak-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--accent-soft-text);
        }

        /* Question count slider */
        .count-slider-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .count-slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
        }
        .count-slider-label span:last-child {
            color: var(--accent-1);
        }
        .count-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: #e5e7eb;
            outline: none;
            cursor: pointer;
        }
        .count-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-1);
            border: 3px solid white;
            box-shadow: 0 0 0 1px #d4d4d4;
            cursor: pointer;
        }
        .count-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-1);
            border: 3px solid white;
            box-shadow: 0 0 0 1px #d4d4d4;
            cursor: pointer;
        }
        .count-slider-minmax {
            display: flex;
            justify-content: space-between;
            font-size: 0.6875rem;
            color: #9ca3af;
        }

        /* Skill tag transparency row */
        .skill-tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-soft-text);
            background: var(--accent-soft-bg);
            padding: 5px 12px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">GCSE Mastery</div>
        <a href="../../dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
        <a href="lectures.html" class="nav-item"><span class="nav-icon">∞</span><span>Lectures</span></a>
        <a href="flashtiles.html" class="nav-item"><span class="nav-icon">⚡</span><span>Flashtiles</span></a>
        <a href="quick-test.html" class="nav-item active"><span class="nav-icon">🕐</span><span>Recall</span></a>
        <a href="past-papers.html" class="nav-item"><span class="nav-icon">📄</span><span>Past Papers</span></a>
        <div class="nav-spacer"></div>
        <button class="live-study-btn">Allow Live Study</button>
    </aside>

    <main class="main-content">
        <div class="content-wrapper compact">
            <div class="subject-header">
                <div class="subject-line-left"></div>
                <h1 class="subject-name">Recall</h1>
                <div class="subject-line-right"></div>
            </div>
        </div>


        <a href="quick-test.html" class="crumb-back">← Recall</a>

        <section class="topics-section">
            <div class="daily-panel">
                <div class="streak-row">🔥 4-day streak</div>
                <div class="daily-stats">
                    <div class="daily-stat">
                        <div class="daily-stat-num">12</div>
                        <div class="daily-stat-label">Due for review</div>
                    </div>
                    <div class="daily-stat">
                        <div class="daily-stat-num">8</div>
                        <div class="daily-stat-label">New</div>
                    </div>
                    <div class="daily-stat">
                        <div class="daily-stat-num" id="todaysSetNum">20</div>
                        <div class="daily-stat-label">Today's set</div>
                    </div>
                </div>

                <!-- Skill tags pulled from fsrs_skill_state — the student's current weakest tags -->
                <div class="skill-tag-row">
                    <span class="skill-tag">Quote retrieval</span>
                    <span class="skill-tag">Effect analysis</span>
                    <span class="skill-tag">Context linking</span>
                </div>

                <div class="count-slider-row">
                    <div class="count-slider-label">
                        <span>Questions today</span>
                        <span id="sliderValueLabel">20</span>
                    </div>
                    <input type="range" min="10" max="50" value="20" step="1" class="count-slider" id="countSlider">
                    <div class="count-slider-minmax">
                        <span>10</span>
                        <span>50</span>
                    </div>
                </div>

                <button class="start-btn" id="startBtn">Start 20 questions</button>
            </div>
        </section>
    </main>

    <script>
        const slider = document.getElementById('countSlider');
        const sliderValueLabel = document.getElementById('sliderValueLabel');
        const todaysSetNum = document.getElementById('todaysSetNum');
        const startBtn = document.getElementById('startBtn');

        slider.addEventListener('input', () => {
            const count = parseInt(slider.value, 10);
            sliderValueLabel.textContent = count;
            todaysSetNum.textContent = count;
            startBtn.textContent = `Start ${count} questions`;
        });
    </script>
</body>
</html>
