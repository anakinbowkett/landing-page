<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA English Literature - Flashtiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
    <style>
        .select-intro { max-width: 700px; font-size: 0.875rem; color: #6b7280; margin-bottom: 24px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">GCSE Mastery</div>
        <a href="../../dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
        <a href="lectures.html" class="nav-item"><span class="nav-icon">∞</span><span>Lectures</span></a>
        <a href="flashtiles.html" class="nav-item active"><span class="nav-icon">⚡</span><span>Flashtiles</span></a>
        <a href="quick-test.html" class="nav-item"><span class="nav-icon">🕐</span><span>Quiz / Quick Test</span></a>
        <a href="past-papers.html" class="nav-item"><span class="nav-icon">📄</span><span>Past Papers</span></a>
        <div class="nav-spacer"></div>
        <button class="live-study-btn">Allow Live Study</button>
    </aside>

    <main class="main-content">
        <div class="content-wrapper compact">
            <div class="subject-header">
                <div class="subject-line-left"></div>
                <h1 class="subject-name" id="sectionTitle">—</h1>
                <div class="subject-line-right"></div>
            </div>
        </div>

        <a href="flashtiles-pillar-decks.html" class="crumb-back">← Pillar Decks</a>

        <section class="topics-section">
            <p class="select-intro" id="sectionIntro"></p>

            <div class="text-selector-wrap" id="textSelectorWrap" style="display:none;">
                <div class="text-selector" id="textSelector"></div>
            </div>

            <div id="pillarList"></div>
        </section>
    </main>

    <script src="lectures-data.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sectionIndex = parseInt(params.get('section'), 10);
        const paper = papersData[sectionIndex];

        document.getElementById('sectionTitle').textContent = paper.title;

        const pillarListEl = document.getElementById('pillarList');

        function renderPillars(pillars, textId) {
            pillarListEl.innerHTML = '';
            pillars.forEach((pillar, pi) => {
                const row = document.createElement('a');
                row.className = 'pillar-list-row';
                const textParam = textId ? `&text=${textId}` : '';
                row.href = `flashtiles-lecture-select.html?section=${sectionIndex}${textParam}&pillar=${pi}`;
                row.innerHTML = `
                    <div class="pillar-list-row-left">
                        <span class="pillar-list-tag">${pillar.tag}</span>
                        <span class="pillar-list-title">${pillar.title}</span>
                    </div>
                    <span class="pillar-list-chevron">›</span>`;
                pillarListEl.appendChild(row);
            });
        }

        if (paper.type === 'multi') {
            document.getElementById('sectionIntro').textContent =
                'Pick your text, then a pillar, then the exact lectures you want as flashcards.';

            const wrap = document.getElementById('textSelectorWrap');
            const selector = document.getElementById('textSelector');
            wrap.style.display = '';

            paper.texts.forEach((text, ti) => {
                const btn = document.createElement('button');
                btn.className = 'text-selector-btn' + (ti === 0 ? ' active' : '');
                btn.textContent = text.name;
                btn.addEventListener('click', () => {
                    selector.querySelectorAll('.text-selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderPillars(text.pillars, text.id);
                });
                selector.appendChild(btn);
            });

            renderPillars(paper.texts[0].pillars, paper.texts[0].id);
        } else {
            document.getElementById('sectionIntro').textContent =
                'No text selector needed here — pick a pillar, then the lectures you want as flashcards.';
            renderPillars(paper.pillars, null);
        }
    </script>
</body>
</html>
