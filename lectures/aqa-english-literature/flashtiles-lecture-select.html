<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA English Literature - Select Topics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
    <style>
        .select-intro { max-width: 700px; font-size: 0.875rem; color: #6b7280; margin-bottom: 20px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">GCSE Mastery</div>
        <a href="../../dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
        <a href="lectures.html" class="nav-item"><span class="nav-icon">∞</span><span>Lectures</span></a>
        <a href="flashtiles.html" class="nav-item active"><span class="nav-icon">⚡</span><span>Flashtiles</span></a>
        <a href="quick-test.html" class="nav-item"><span class="nav-icon">🕐</span><span>Quiz / Quick Test</span></a>
        <a href="past-papers.html" class="nav-item"><span class="nav-icon">📄</span><span>Past Papers</span></a>
        <div class="nav-spacer"></div>
        <button class="live-study-btn">Allow Live Study</button>
    </aside>

    <main class="main-content">
        <div class="content-wrapper compact">
            <div class="subject-header">
                <div class="subject-line-left"></div>
                <h1 class="subject-name" id="pillarTitle">—</h1>
                <div class="subject-line-right"></div>
            </div>
        </div>

        <a href="#" class="crumb-back" id="crumbBack">← Back</a>

        <section class="topics-section">
            <p class="select-intro">Tick the lectures you want as flashcards. Tap a selected one again to take it back out.</p>

            <div class="lecture-select-list" id="lectureList"></div>
        </section>

        <div class="selection-basket-bar" id="basketBar" style="display: none;">
            <span class="basket-count" id="basketCount">0 selected</span>
            <div class="basket-actions">
                <button class="basket-clear-btn" id="clearBtn">Clear</button>
                <button class="basket-start-btn" id="startBtn">Start Deck →</button>
            </div>
        </div>
    </main>

    <script src="lectures-data.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sectionIndex = parseInt(params.get('section'), 10);
        const textId = params.get('text');
        const pillarIndex = parseInt(params.get('pillar'), 10);

        const paper = papersData[sectionIndex];
        let pillars, backHref, backLabel;

        if (paper.type === 'multi') {
            const text = paper.texts.find(t => t.id === textId);
            pillars = text.pillars;
            backHref = `flashtiles-section.html?section=${sectionIndex}`;
            backLabel = `← ${text.name}`;
        } else {
            pillars = paper.pillars;
            backHref = `flashtiles-section.html?section=${sectionIndex}`;
            backLabel = `← ${paper.title}`;
        }

        const pillar = pillars[pillarIndex];
        document.getElementById('pillarTitle').textContent = pillar.title;
        const crumb = document.getElementById('crumbBack');
        crumb.href = backHref;
        crumb.textContent = backLabel;

        const list = document.getElementById('lectureList');
        const basketBar = document.getElementById('basketBar');
        const basketCount = document.getElementById('basketCount');
        const checkSvg = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L4.5 8.5L10 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        pillar.lectures.forEach((lec, i) => {
            const title = typeof lec === 'string' ? slugToTitle(lec) : lec.title;
            const row = document.createElement('div');
            row.className = 'lecture-select-row';
            row.dataset.id = i;
            row.innerHTML = `
                <div class="lecture-select-left">
                    <span class="lecture-checkbox">${checkSvg}</span>
                    <span class="lecture-select-name">${title}</span>
                </div>
                <span class="lecture-select-action">Add</span>`;
            row.addEventListener('click', () => toggleRow(row));
            list.appendChild(row);
        });

        function toggleRow(row) {
            row.classList.toggle('selected');
            const action = row.querySelector('.lecture-select-action');
            action.textContent = row.classList.contains('selected') ? 'Added ✓' : 'Add';
            updateBasket();
        }

        function updateBasket() {
            const selected = document.querySelectorAll('.lecture-select-row.selected');
            basketBar.style.display = selected.length ? 'flex' : 'none';
            basketCount.textContent = `${selected.length} selected`;
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.querySelectorAll('.lecture-select-row.selected').forEach(row => {
                row.classList.remove('selected');
                row.querySelector('.lecture-select-action').textContent = 'Add';
            });
            updateBasket();
        });

        list.addEventListener('mouseover', e => {
            const row = e.target.closest('.lecture-select-row.selected');
            if (row) row.querySelector('.lecture-select-action').textContent = 'Remove';
        });
        list.addEventListener('mouseout', e => {
            const row = e.target.closest('.lecture-select-row.selected');
            if (row) row.querySelector('.lecture-select-action').textContent = 'Added ✓';
        });
    </script>
</body>
</html>
