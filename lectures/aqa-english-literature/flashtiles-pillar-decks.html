<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQA English Literature - Pillar Decks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">GCSE Mastery</div>
        <a href="../../dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Dashboard</span></a>
        <a href="lectures.html" class="nav-item"><span class="nav-icon">∞</span><span>Lectures</span></a>
        <a href="flashtiles.html" class="nav-item active"><span class="nav-icon">⚡</span><span>Flashtiles</span></a>
        <a href="quick-test.html" class="nav-item"><span class="nav-icon">🕐</span><span>Quiz / Quick Test</span></a>
        <a href="past-papers.html" class="nav-item"><span class="nav-icon">📄</span><span>Past Papers</span></a>
        <div class="nav-spacer"></div>
        <button class="live-study-btn">Allow Live Study</button>
    </aside>

    <main class="main-content">
        <div class="content-wrapper compact">
            <div class="subject-header">
                <div class="subject-line-left"></div>
                <h1 class="subject-name">Pillar Decks</h1>
                <div class="subject-line-right"></div>
            </div>
        </div>

        <a href="flashtiles.html" class="crumb-back">← Flashtiles</a>

        <section class="topics-section">
            <p style="max-width: 700px; font-size: 0.875rem; color: #6b7280; margin-bottom: 20px;">Same structure as your Lectures — pick a paper, section or text, then choose exactly which lectures become flashcards.</p>

            <div id="sectionList"></div>
        </section>
    </main>

    <script src="lectures-data.js"></script>
    <script>
        const list = document.getElementById('sectionList');
        papersData.forEach((paper, i) => {
            const row = document.createElement('a');
            row.className = 'pillar-list-row';
            row.href = `flashtiles-section.html?section=${i}`;
            row.innerHTML = `
                <div class="pillar-list-row-left">
                    <span class="pillar-list-tag">${paper.tag}</span>
                    <span class="pillar-list-title">${paper.title}</span>
                </div>
                <span class="pillar-list-chevron">›</span>`;
            list.appendChild(row);
        });
    </script>
</body>
</html>
